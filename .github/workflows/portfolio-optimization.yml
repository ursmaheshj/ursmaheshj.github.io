name: 🚀 Portfolio Optimization Suite

# Single unified workflow for all performance optimizations
# Replaces: optimize-images.yml, minify-assets.yml, compress-assets.yml, lighthouse.yml, link-check.yml

on:
  push:
    branches: [main, master]
    paths:
      - '**.html'
      - '**.css'
      - '**.js'
      - '**.md'
      - 'images/**'
      - '!**.min.js'
      - '!**.min.css'
  
  pull_request:
    branches: [main, master]
  
  workflow_dispatch:  # Manual trigger (run whenever you want)

jobs:
  optimize:
    name: Optimize Portfolio
    runs-on: ubuntu-latest
    
    permissions:
      contents: write      # To commit optimized files
      issues: write        # To create link health issues
      pull-requests: write # To comment on PRs
    
    steps:
      # ============================================
      # STEP 1: Setup and Detection
      # ============================================
      
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for proper change detection
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🔍 Detect file changes
        id: changes
        run: |
          # Detect what files changed to run only necessary steps
          echo "Detecting changed files..."
          
          # For manual runs, process everything
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "images=true" >> $GITHUB_OUTPUT
            echo "assets=true" >> $GITHUB_OUTPUT
            echo "static=true" >> $GITHUB_OUTPUT
            echo "content=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Get changed files
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }})
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          fi
          
          echo "Changed files:"
          echo "$CHANGED_FILES"
          
          # Check for image changes
          if echo "$CHANGED_FILES" | grep -qE '^images/.*\.(jpg|jpeg|png|gif|webp)$'; then
            echo "images=true" >> $GITHUB_OUTPUT
            echo "✅ Image files changed"
          else
            echo "images=false" >> $GITHUB_OUTPUT
          fi
          
          # Check for CSS/JS changes
          if echo "$CHANGED_FILES" | grep -qE '\.(css|js)$' | grep -vE '\.min\.(css|js)$'; then
            echo "assets=true" >> $GITHUB_OUTPUT
            echo "✅ CSS/JS files changed"
          else
            echo "assets=false" >> $GITHUB_OUTPUT
          fi
          
          # Check for static files (for compression)
          if echo "$CHANGED_FILES" | grep -qE '\.(html|css|js|json|svg)$'; then
            echo "static=true" >> $GITHUB_OUTPUT
            echo "✅ Static files changed"
          else
            echo "static=false" >> $GITHUB_OUTPUT
          fi
          
          # Check for content changes (HTML, MD, content.js)
          if echo "$CHANGED_FILES" | grep -qE '\.(html|md)$|js/content\.js$'; then
            echo "content=true" >> $GITHUB_OUTPUT
            echo "✅ Content files changed"
          else
            echo "content=false" >> $GITHUB_OUTPUT
          fi
      
      # ============================================
      # STEP 2: Image Optimization
      # ============================================
      
      - name: 🐍 Setup Python for image optimization
        if: steps.changes.outputs.images == 'true'
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: 📦 Install Python dependencies
        if: steps.changes.outputs.images == 'true'
        run: |
          pip install -r scripts/requirements.txt
      
      - name: 🖼️ Optimize images
        if: steps.changes.outputs.images == 'true'
        run: |
          echo "🖼️ Optimizing images..."
          python scripts/optimize-images.py
          
          # Check if images were modified
          if git diff --quiet images/; then
            echo "✅ No image optimization needed (already optimized)"
          else
            echo "✅ Images optimized successfully"
            git add images/
          fi
      
      # ============================================
      # STEP 3: Asset Minification
      # ============================================
      
      - name: 🟢 Setup Node.js
        if: steps.changes.outputs.assets == 'true' || steps.changes.outputs.static == 'true' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 🗜️ Minify CSS and JavaScript
        if: steps.changes.outputs.assets == 'true'
        run: |
          echo "🗜️ Installing minifiers..."
          npm install -g html-minifier-terser clean-css-cli terser
          
          echo ""
          echo "📊 Minification Results:"
          echo "======================="
          
          # Minify CSS files
          echo ""
          echo "CSS Files:"
          for file in css/*.css; do
            # Skip already minified files
            if [[ "$file" == *.min.css ]]; then
              continue
            fi
            
            output="${file%.css}.min.css"
            original_size=$(wc -c < "$file")
            
            cleancss -o "$output" "$file"
            minified_size=$(wc -c < "$output")
            
            savings=$((100 - (minified_size * 100 / original_size)))
            echo "  ✅ $(basename "$file"): ${original_size} → ${minified_size} bytes (-${savings}%)"
          done
          
          # Minify JS files
          echo ""
          echo "JavaScript Files:"
          for file in js/*.js; do
            # Skip already minified files
            if [[ "$file" == *.min.js ]]; then
              continue
            fi
            
            output="${file%.js}.min.js"
            original_size=$(wc -c < "$file")
            
            terser "$file" -o "$output" --compress --mangle
            minified_size=$(wc -c < "$output")
            
            savings=$((100 - (minified_size * 100 / original_size)))
            echo "  ✅ $(basename "$file"): ${original_size} → ${minified_size} bytes (-${savings}%)"
          done
          
          echo ""
          echo "✅ Minification complete!"
          
          # Stage minified files
          git add css/*.min.css js/*.min.js 2>/dev/null || true
      
      # ============================================
      # STEP 3.5: Update HTML to Use Minified Assets
      # ============================================
      
      - name: 📝 Update HTML files to use minified assets
        if: steps.changes.outputs.assets == 'true'
        run: |
          echo "📝 Updating HTML files to reference minified assets..."
          
          # Update all HTML files to use .min.css and .min.js
          for html in *.html; do
            echo "  Processing $html..."
            
            # Replace CSS references
            sed -i 's|href="css/styles\.css"|href="css/styles.min.css"|g' "$html"
            
            # Replace JS references (but not content.js - that's data)
            sed -i 's|src="js/shared\.js"|src="js/shared.min.js"|g' "$html"
            sed -i 's|src="js/interactive\.js"|src="js/interactive.min.js"|g' "$html"
            sed -i 's|src="js/script\.js"|src="js/script.min.js"|g' "$html"
          done
          
          echo ""
          echo "✅ HTML files updated to use minified assets!"
          echo ""
          echo "💡 Benefits:"
          echo "   • HTML loads .min.css and .min.js (30-60% smaller)"
          echo "   • CDN auto-serves .min.css.gz or .min.css.br (60-80% smaller)"
          echo "   • Total: ~85% bandwidth reduction!"
          
          # Stage updated HTML files
          git add *.html 2>/dev/null || true
      
      # ============================================
      # STEP 4: Pre-Compression (Gzip + Brotli)
      # ============================================
      
      - name: 🗜️ Pre-compress assets with Gzip and Brotli
        if: steps.changes.outputs.static == 'true'
        run: |
          echo "🗜️ Installing compression tools..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq gzip brotli > /dev/null
          
          echo ""
          echo "📊 Pre-Compression Results:"
          echo "==========================="
          
          # Function to compress a file
          compress_file() {
            local file="$1"
            local original_size=$(wc -c < "$file")
            
            # Gzip compression (level 9 = maximum)
            gzip -9 -k -f "$file"
            local gz_size=$(wc -c < "${file}.gz")
            local gz_savings=$((100 - (gz_size * 100 / original_size)))
            
            # Brotli compression (quality 11 = maximum)
            brotli -k -f -q 11 "$file"
            local br_size=$(wc -c < "${file}.br")
            local br_savings=$((100 - (br_size * 100 / original_size)))
            
            echo "  ✅ $(basename "$file"):"
            echo "     Original: ${original_size} bytes"
            echo "     Gzip:     ${gz_size} bytes (-${gz_savings}%)"
            echo "     Brotli:   ${br_size} bytes (-${br_savings}%)"
            echo ""
          }
          
          # Compress HTML files
          echo "HTML Files:"
          find . -name "*.html" -not -path "./node_modules/*" -not -path "./.git/*" | while read file; do
            compress_file "$file"
          done
          
          # Compress CSS files
          echo "CSS Files:"
          find css -name "*.css" | while read file; do
            compress_file "$file"
          done
          
          # Compress JS files
          echo "JavaScript Files:"
          find js -name "*.js" | while read file; do
            compress_file "$file"
          done
          
          # Compress JSON files (excluding package files)
          if ls *.json 2>/dev/null | grep -v package; then
            echo "JSON Files:"
            for file in *.json; do
              if [[ "$file" != "package.json" && "$file" != "package-lock.json" ]]; then
                compress_file "$file"
              fi
            done
          fi
          
          # Compress SVG files
          if find . -name "*.svg" -not -path "./node_modules/*" | grep -q .; then
            echo "SVG Files:"
            find . -name "*.svg" -not -path "./node_modules/*" | while read file; do
              compress_file "$file"
            done
          fi
          
          echo "✅ Pre-compression complete!"
          echo ""
          echo "💡 These .gz and .br files will be automatically served by:"
          echo "   • Netlify"
          echo "   • Vercel"
          echo "   • Firebase Hosting"
          echo "   • Cloudflare"
          echo "   • Most modern CDNs"
          
          # Stage compressed files
          git add **/*.gz **/*.br 2>/dev/null || true
      
      # ============================================
      # STEP 5: Link Health Check
      # ============================================
      
      - name: 🔗 Check external links in HTML/Markdown
        if: steps.changes.outputs.content == 'true' || github.event_name == 'workflow_dispatch'
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          config-file: '.github/link-check-config.json'
          use-quiet-mode: 'no'
          use-verbose-mode: 'yes'
        continue-on-error: true
      
      - name: 🔗 Check URLs in content.js
        if: steps.changes.outputs.content == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          echo "🔗 Checking URLs in js/content.js..."
          
          # Extract URLs from content.js
          grep -oE 'https?://[^"]+' js/content.js > urls.txt || true
          
          if [ ! -s urls.txt ]; then
            echo "✅ No URLs found in content.js"
            exit 0
          fi
          
          echo "Found $(wc -l < urls.txt) URLs to check"
          echo ""
          
          broken_urls=()
          
          while IFS= read -r url; do
            # Skip placeholders
            if [[ "$url" == *"example.com"* ]] || [[ "$url" == *"placeholder"* ]]; then
              continue
            fi
            
            echo -n "Checking: $url ... "
            status=$(curl -o /dev/null -s -w "%{http_code}" -L --max-time 10 "$url" || echo "TIMEOUT")
            
            if [[ "$status" =~ ^[23] ]]; then
              echo "✅ OK ($status)"
            elif [[ "$status" == "TIMEOUT" ]]; then
              echo "⏱️ TIMEOUT"
            else
              echo "❌ BROKEN ($status)"
              broken_urls+=("$url ($status)")
            fi
          done < urls.txt
          
          rm urls.txt
          
          if [ ${#broken_urls[@]} -gt 0 ]; then
            echo ""
            echo "⚠️ Found ${#broken_urls[@]} broken URL(s):"
            printf '%s\n' "${broken_urls[@]}"
            echo ""
            echo "broken_urls=${#broken_urls[@]}" >> $GITHUB_ENV
            printf '%s\n' "${broken_urls[@]}" > broken_urls.txt
          else
            echo ""
            echo "✅ All URLs are valid!"
            echo "broken_urls=0" >> $GITHUB_ENV
          fi
        continue-on-error: true
      
      - name: 🖼️ Check image paths
        if: steps.changes.outputs.content == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          echo "🖼️ Checking image paths in js/content.js..."
          
          # Extract image paths
          grep -oE '"images/[^"]+\.(jpg|jpeg|png|gif|webp)"' js/content.js | tr -d '"' > image_paths.txt || true
          
          if [ ! -s image_paths.txt ]; then
            echo "✅ No image paths found in content.js"
            exit 0
          fi
          
          echo "Found $(wc -l < image_paths.txt) image paths to check"
          echo ""
          
          missing_images=()
          
          while IFS= read -r path; do
            echo -n "Checking: $path ... "
            if [ -f "$path" ]; then
              echo "✅ EXISTS"
            else
              echo "❌ MISSING"
              missing_images+=("$path")
            fi
          done < image_paths.txt
          
          rm image_paths.txt
          
          if [ ${#missing_images[@]} -gt 0 ]; then
            echo ""
            echo "⚠️ Found ${#missing_images[@]} missing image(s):"
            printf '%s\n' "${missing_images[@]}"
            echo ""
            echo "missing_images=${#missing_images[@]}" >> $GITHUB_ENV
            printf '%s\n' "${missing_images[@]}" > missing_images.txt
          else
            echo ""
            echo "✅ All image paths are valid!"
            echo "missing_images=0" >> $GITHUB_ENV
          fi
        continue-on-error: true
      
      - name: 📋 Create issue for broken links (manual trigger only)
        if: (github.event_name == 'workflow_dispatch') && (env.broken_urls != '0' || env.missing_images != '0')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let body = '## 🔗 Weekly Link Health Report\n\n';
            body += `**Date:** ${new Date().toISOString().split('T')[0]}\n\n`;
            
            if (process.env.broken_urls !== '0') {
              body += `### ❌ Broken URLs (${process.env.broken_urls})\n\n`;
              const brokenUrls = fs.readFileSync('broken_urls.txt', 'utf8').trim().split('\n');
              brokenUrls.forEach(url => {
                body += `- ${url}\n`;
              });
              body += '\n';
            }
            
            if (process.env.missing_images !== '0') {
              body += `### 🖼️ Missing Images (${process.env.missing_images})\n\n`;
              const missingImages = fs.readFileSync('missing_images.txt', 'utf8').trim().split('\n');
              missingImages.forEach(img => {
                body += `- ${img}\n`;
              });
              body += '\n';
            }
            
            body += '---\n';
            body += '*This issue was automatically created by the Portfolio Optimization workflow.*\n';
            body += '*Check the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.*';
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔗 Weekly Link Health Report - Issues Found',
              body: body,
              labels: ['link-health', 'automated']
            });
        continue-on-error: true
      
      # ============================================
      # STEP 6: Lighthouse Performance Audit
      # ============================================
      
      - name: 🚦 Install Lighthouse CI
        if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        run: |
          npm install -g @lhci/cli@0.12.x
      
      - name: 🚦 Run Lighthouse CI
        if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        run: |
          echo "🚦 Starting Lighthouse CI audit..."
          
          # Start local HTTP server
          npx http-server . -p 8080 -s &
          SERVER_PID=$!
          
          # Wait for server to start
          echo "Waiting for server to start..."
          sleep 5
          
          # Run Lighthouse CI
          lhci autorun --config=lighthouserc.json || true
          
          # Stop server
          kill $SERVER_PID || true
          
          echo ""
          echo "✅ Lighthouse audit complete!"
          echo "📊 View detailed results in the Actions summary"
        continue-on-error: true
      
      - name: 📊 Upload Lighthouse results
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: .lighthouseci
        continue-on-error: true
      
      # ============================================
      # STEP 7: Commit All Optimizations
      # ============================================
      
      - name: 💾 Commit optimized files
        run: |
          # Configure git
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "✅ No changes to commit (all files already optimized)"
            exit 0
          fi
          
          echo "📝 Committing optimized files..."
          
          # Create detailed commit message
          commit_msg="🚀 Auto-optimize portfolio assets [skip ci]"
          commit_msg+="\n\nOptimizations applied:"
          
          if [ "${{ steps.changes.outputs.images }}" == "true" ]; then
            commit_msg+="\n- 🖼️ Image optimization"
          fi
          if [ "${{ steps.changes.outputs.assets }}" == "true" ]; then
            commit_msg+="\n- 🗜️ CSS/JS minification"
          fi
          if [ "${{ steps.changes.outputs.static }}" == "true" ]; then
            commit_msg+="\n- 🗜️ Gzip/Brotli compression"
          fi
          
          commit_msg+="\n\nTriggered by: ${{ github.event_name }}"
          commit_msg+="\nWorkflow: ${{ github.workflow }}"
          commit_msg+="\nRun: ${{ github.run_number }}"
          
          git commit -m "$(echo -e "$commit_msg")"
          git push
          
          echo ""
          echo "✅ Changes committed and pushed successfully!"
      
      # ============================================
      # STEP 8: Summary
      # ============================================
      
      - name: 📊 Generate workflow summary
        if: always()
        run: |
          echo "# 🚀 Portfolio Optimization Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow Run:** #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## ✅ Steps Executed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.changes.outputs.images }}" == "true" ]; then
            echo "- ✅ **Image Optimization** - Images resized and compressed" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ steps.changes.outputs.assets }}" == "true" ]; then
            echo "- ✅ **Asset Minification** - CSS/JS files minified (30-60% reduction)" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ steps.changes.outputs.static }}" == "true" ]; then
            echo "- ✅ **Pre-Compression** - Gzip/Brotli files generated (60-80% reduction)" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ steps.changes.outputs.content }}" == "true" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "- ✅ **Link Health Check** - URLs and image paths validated" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ github.event_name }}" == "push" ] || [ "${{ github.event_name }}" == "pull_request" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "- ✅ **Lighthouse Audit** - Performance metrics measured" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📈 Performance Impact" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Optimization | Expected Savings |" >> $GITHUB_STEP_SUMMARY
          echo "|--------------|------------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Minification | 30-60% file size |" >> $GITHUB_STEP_SUMMARY
          echo "| Compression  | 60-80% bandwidth |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Opt    | 60-90% image size|" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total Impact:** ~70% smaller pages, ~65% faster load times" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*View full documentation: [PERFORMANCE_WORKFLOWS.md](../PERFORMANCE_WORKFLOWS.md)*" >> $GITHUB_STEP_SUMMARY

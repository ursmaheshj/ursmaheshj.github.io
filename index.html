<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mahesh — Software Engineer. Python, Automation, Data.">
  <title>Mahesh | About</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Noto+Sans:wght@400;500;700&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body>

  <!-- ── NAV ─────────────────────────────────────────────── -->
  <header class="navbar" role="banner">
    <div class="navbar__inner">
      <a class="navbar__brand" id="brand-name" href="index.html">Mahesh</a>
      <nav aria-label="Primary navigation">
        <ul id="nav-links" class="navbar__links" role="list"></ul>
      </nav>
      <div class="navbar__controls">
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" type="button">
          <i class="fa-solid fa-sun" aria-hidden="true"></i>
        </button>
        <button class="navbar__hamburger" id="nav-hamburger" aria-label="Toggle navigation" aria-expanded="false" type="button">
          <i class="fa-solid fa-bars" aria-hidden="true"></i>
        </button>
      </div>
    </div>
  </header>

  <main>

    <!-- ── ABOUT (profile sidebar + bio) ──────────────────── -->
    <section class="about-section">
      <div class="about-grid">

        <!-- left sidebar -->
        <aside class="profile-sidebar">
          <div class="profile-photo-wrap">
            <div class="profile-photo" id="profile-photo" aria-label="Profile photo placeholder"></div>
          </div>
          <h1 class="profile-name" id="profile-name"></h1>
          <p class="profile-role" id="profile-role"></p>
          <p class="profile-affiliation" id="profile-affiliation"></p>
          <address class="profile-address" id="profile-address"></address>
          <nav class="profile-social" id="profile-social" aria-label="Social links"></nav>
        </aside>

        <!-- right bio -->
        <div class="about-bio">
          <p id="about-bio-text"></p>
          <div id="about-points" class="about-points"></div>

          <!-- Latest posts preview (links to blog.html) -->
          <div class="feed-block reveal" id="posts-preview">
            <div class="feed-title-row">
              <h2 class="feed-title">Latest Posts</h2>
              <a href="blog.html" class="view-all">View all posts <i class="fa-solid fa-arrow-right fa-xs" aria-hidden="true"></i></a>
            </div>
            <table class="news-table">
              <tbody id="posts-preview-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <p>&copy; <span id="footer-year"></span> <span id="footer-name"></span>. use template <code><a href="https://github.com/ursmaheshj/mj-folio">mj-folio</a></code>.</p>
  </footer>

  <script src="js/content.js"></script>
  <script src="js/shared.min.js"></script>
  <script src="js/interactive.min.js" defer></script>
  <script src="js/script.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Projects — automation, data engineering, and more.">
  <title>Mahesh | Projects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Noto+Sans:wght@400;500;700&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body>

  <!-- ── NAV ─────────────────────────────────────────────── -->
  <header class="navbar" role="banner">
    <div class="navbar__inner">
      <a class="navbar__brand" id="brand-name" href="index.html">Mahesh</a>
      <nav aria-label="Primary navigation">
        <ul id="nav-links" class="navbar__links" role="list"></ul>
      </nav>
      <div class="navbar__controls">
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" type="button">
          <i class="fa-solid fa-sun" aria-hidden="true"></i>
        </button>
        <button class="navbar__hamburger" id="nav-hamburger" aria-label="Toggle navigation" aria-expanded="false" type="button">
          <i class="fa-solid fa-bars" aria-hidden="true"></i>
        </button>
      </div>
    </div>
  </header>

  <main>
    <div class="page-hero reveal">
      <h1 class="page-title">Projects</h1>
      <p class="page-desc">Selected work spanning automation, data engineering, and systems. Filter by technology below.</p>
    </div>

    <div id="project-filters" class="filter-bar" role="tablist" aria-label="Filter by technology"></div>
    <div id="project-grid" class="project-grid"></div>
  </main>

  <footer class="site-footer">
    <p>&copy; <span id="footer-year"></span> <span id="footer-name"></span>. use template <code><a href="https://github.com/ursmaheshj/mj-folio">mj-folio</a></code>.</p>
  </footer>

  <script src="js/content.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/interactive.js" defer></script>
  <script>
    const projectState = { filter: "All", highlightedProjectIndex: null };

    // Get all unique technologies from project stacks
    function getProjectTechnologies() {
      const allTech = new Set();
      (window.PORTFOLIO_DATA?.projects || []).forEach(p => {
        (p.stack || []).forEach(tech => allTech.add(tech));
      });
      return ["All", ...Array.from(allTech).sort()];
    }

    function renderProjectFilters() {
      document.getElementById("project-filters").innerHTML = getProjectTechnologies()
        .map(
          (tech) =>
            `<button class="filter-pill${tech === projectState.filter ? " is-active" : ""}" data-project-filter="${tech}" type="button">${tech}</button>`
        )
        .join("");
    }

    function renderProjects() {
      const projects = window.PORTFOLIO_DATA?.projects || [];
      const filtered =
        projectState.filter === "All"
          ? projects
          : projects.filter((p) => (p.stack || []).includes(projectState.filter));

      document.getElementById("project-grid").innerHTML = filtered
        .map((project, index) => {
          const hasImages = project.images && project.images.length > 0;
          const hasMultipleImages = hasImages && project.images.length > 1;
          
          return `
            <article class="project-card reveal" data-project-index="${index}" role="button" tabindex="0">
              ${hasImages ? `
                <div class="project-card__image-slider" data-project-id="${index}">
                  <div class="project-card__images">
                    ${project.images.map((img, imgIndex) => `
                      <img 
                        src="${img}" 
                        alt="${project.title} - Image ${imgIndex + 1}"
                        class="project-card__image ${imgIndex === 0 ? 'is-active' : ''}"
                        loading="lazy"
                      />
                    `).join('')}
                  </div>
                  ${hasMultipleImages ? `
                    <button class="project-slider__btn project-slider__btn--prev" data-action="prev" aria-label="Previous image">
                      <i class="fa-solid fa-chevron-left"></i>
                    </button>
                    <button class="project-slider__btn project-slider__btn--next" data-action="next" aria-label="Next image">
                      <i class="fa-solid fa-chevron-right"></i>
                    </button>
                    <div class="project-slider__dots">
                      ${project.images.map((_, dotIndex) => `
                        <button class="project-slider__dot ${dotIndex === 0 ? 'is-active' : ''}" data-index="${dotIndex}" aria-label="Go to image ${dotIndex + 1}"></button>
                      `).join('')}
                    </div>
                  ` : ''}
                </div>
              ` : ''}
              <div class="project-card__content">
                <span class="project-card__year">${project.year}</span>
                <h3 class="project-card__title">${project.title}</h3>
                <p class="project-card__summary">${project.summary}</p>
                ${project.impact ? `<p class="project-card__impact"><i class="fa-solid fa-bolt fa-sm" aria-hidden="true"></i> ${project.impact}</p>` : ''}
                ${project.details ? `
                  <ul class="project-card__details">
                    ${project.details.map(detail => `<li>${detail}</li>`).join('')}
                  </ul>
                ` : ''}
                <div class="project-card__stack">
                  ${project.stack.map((s) => `<span class="tag">${s}</span>`).join("")}
                </div>
                <div class="project-card__links">
                  ${project.links.map((l) => `<a class="btn btn-outline btn-sm" href="${l.url}"><i class="fa-solid fa-arrow-up-right-from-square fa-sm" aria-hidden="true"></i> ${l.label}</a>`).join("")}
                </div>
              </div>
            </article>`;
        })
        .join("");
      setupReveal();
      initializeProjectSliders();
      initializeProjectCards();
    }

    // Image slider functionality for cards
    function initializeProjectSliders() {
      document.querySelectorAll('.project-card__image-slider').forEach(slider => {
        const images = slider.querySelectorAll('.project-card__image');
        const dots = slider.querySelectorAll('.project-slider__dot');
        let currentIndex = 0;

        const showImage = (index) => {
          images.forEach((img, i) => {
            img.classList.toggle('is-active', i === index);
          });
          dots.forEach((dot, i) => {
            dot.classList.toggle('is-active', i === index);
          });
          currentIndex = index;
        };

        slider.addEventListener('click', (e) => {
          e.stopPropagation(); // Prevent card click from highlighting
          const btn = e.target.closest('[data-action]');
          const dot = e.target.closest('[data-index]');
          
          if (btn) {
            e.preventDefault();
            const action = btn.dataset.action;
            if (action === 'prev') {
              const newIndex = currentIndex > 0 ? currentIndex - 1 : images.length - 1;
              showImage(newIndex);
            } else if (action === 'next') {
              const newIndex = currentIndex < images.length - 1 ? currentIndex + 1 : 0;
              showImage(newIndex);
            }
          }
          
          if (dot) {
            e.preventDefault();
            showImage(parseInt(dot.dataset.index));
          }
        });
      });
    }

    // Project card highlight functionality
    function initializeProjectCards() {
      document.querySelectorAll('.project-card').forEach(card => {
        card.addEventListener('click', (e) => {
          // Don't highlight if clicking on links
          if (e.target.closest('a')) return;
          
          const projectIndex = parseInt(card.dataset.projectIndex);
          highlightProjectCard(projectIndex);
        });
        
        // Make images clickable to highlight
        const images = card.querySelectorAll('.project-card__image');
        images.forEach(img => {
          img.style.cursor = 'pointer';
          img.addEventListener('click', (e) => {
            e.stopPropagation();
            const projectIndex = parseInt(card.dataset.projectIndex);
            highlightProjectCard(projectIndex);
          });
        });

        card.addEventListener('keypress', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            const projectIndex = parseInt(card.dataset.projectIndex);
            highlightProjectCard(projectIndex);
          }
        });
      });
    }

    function highlightProjectCard(projectIndex) {
      const projectGrid = document.getElementById('project-grid');
      const cards = document.querySelectorAll('.project-card');
      
      // Remove highlight from all cards
      cards.forEach(card => card.classList.remove('is-highlighted'));
      projectGrid.classList.remove('has-highlighted');
      
      // Remove existing close button
      const existingCloseBtn = document.getElementById('project-close-btn');
      if (existingCloseBtn) existingCloseBtn.remove();
      
      // Add highlight to selected card
      const selectedCard = document.querySelector(`[data-project-index="${projectIndex}"]`);
      if (selectedCard) {
        selectedCard.classList.add('is-highlighted');
        projectGrid.classList.add('has-highlighted');
        projectState.highlightedProjectIndex = projectIndex;
        
        // Create and add close button on card
        const closeBtn = document.createElement('button');
        closeBtn.id = 'project-close-btn';
        closeBtn.innerHTML = '&times;';
        closeBtn.setAttribute('aria-label', 'Close project details');
        closeBtn.style.cssText = `
          position: absolute;
          top: 12px;
          right: 12px;
          width: 28px;
          height: 28px;
          background: var(--accent);
          color: white;
          border: none;
          border-radius: 50%;
          font-size: 20px;
          cursor: pointer;
          z-index: 102;
          display: flex;
          align-items: center;
          justify-content: center;
          transition: all 150ms ease;
          padding: 0;
          line-height: 1;
        `;
        closeBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          clearHighlight();
        });
        closeBtn.addEventListener('mouseover', () => {
          closeBtn.style.opacity = '0.8';
          closeBtn.style.transform = 'scale(1.05)';
        });
        closeBtn.addEventListener('mouseout', () => {
          closeBtn.style.opacity = '1';
          closeBtn.style.transform = 'scale(1)';
        });
        selectedCard.appendChild(closeBtn);
      }
    }

    function clearHighlight() {
      const projectGrid = document.getElementById('project-grid');
      const cards = document.querySelectorAll('.project-card');
      cards.forEach(card => card.classList.remove('is-highlighted'));
      projectGrid.classList.remove('has-highlighted');
      projectState.highlightedProjectIndex = null;
      
      // Remove close button
      const closeBtn = document.getElementById('project-close-btn');
      if (closeBtn) closeBtn.remove();
    }

    // Clear highlight when clicking on background
    document.addEventListener('click', (e) => {
      const pf = e.target.closest("[data-project-filter]");
      const projectCard = e.target.closest('.project-card');
      
      if (pf) {
        projectState.filter = pf.dataset.projectFilter;
        renderProjectFilters();
        renderProjects();
        clearHighlight();
      } else if (!projectCard && projectState.highlightedProjectIndex !== null) {
        clearHighlight();
      }
    });

    // Close highlight on ESC key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && projectState.highlightedProjectIndex !== null) {
        clearHighlight();
      }
    });

    initPage("Projects");
    renderProjectFilters();
    renderProjects();
    setupReveal();
  </script>
</body>
</html>
